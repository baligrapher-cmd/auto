name: Compile AutoYu for All Platforms

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # --- WINDOWS BUILD ---
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller pillow playwright
    
    - name: Install Playwright Browsers (Internal)
      run: |
        $env:PLAYWRIGHT_BROWSERS_PATH = "$PWD\pw-browsers"
        python -m playwright install chromium ffmpeg
    
    - name: Build Main Version (AutoYu Pro)
      run: |
        pyinstaller --clean --noconfirm AutoYuPro.spec
        # Manually copy browsers
        if (Test-Path "pw-browsers") {
          $APP_PATH = "dist\AutoYuPro"
          New-Item -ItemType Directory -Force -Path "$APP_PATH\browsers"
          Copy-Item -Path "pw-browsers\*" -Destination "$APP_PATH\browsers" -Recurse
        }
    
    - name: Smoke Test (Windows Pro)
      run: |
        cd dist\AutoYuPro
        .\AutoYuPro.exe --smoke-test
    
    - name: Prepare Artifacts
      run: |
        New-Item -ItemType Directory -Force -Path "release_pro" | Out-Null
        Copy-Item "PANDUAN_USER.txt" "release_pro\"
        
        # Compress Pro Version
        if (Test-Path "dist\AutoYuPro") {
          Copy-Item "PANDUAN_USER.txt" "dist\AutoYuPro\"
          Compress-Archive -Path "dist\AutoYuPro" -DestinationPath "release_pro\AutoYuPro-Windows.zip"
        }
    
    - name: Upload Pro Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AutoYuPro-Windows
        path: release_pro/*

  # --- MAC INTEL BUILD (macos-14 + Rosetta + Miniforge x86_64, NO QUEUE) ---
  build-macos-intel:
    name: Build for Intel
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      MACOSX_DEPLOYMENT_TARGET: '10.15'
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers
      CONDA: ${{ github.workspace }}/miniforge3
      TARGET_ARCH: 'x86_64'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Miniforge x86_64 (via Rosetta)
        run: |
          # Download Miniforge x86_64
          curl -L -o Miniforge3-MacOSX-x86_64.sh https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-MacOSX-x86_64.sh
          # Install silently
          arch -x86_64 bash Miniforge3-MacOSX-x86_64.sh -b -p $CONDA
          # Initialize conda
          source $CONDA/etc/profile.d/conda.sh
          # Create environment with Python 3.10
          conda create -y -n autoyu python=3.10
          conda activate autoyu
          # Show Python
          which python
          python -VV
          python -c "import platform, sys; print(platform.platform()); print(platform.machine()); print(sys.executable)"



      - name: Install Dependencies (Intel)
        run: |
          source $CONDA/etc/profile.d/conda.sh
          conda activate autoyu
          # Install native libs via conda (no build from source!)
          conda install -y "cryptography>=38" "pillow>=10" "psutil>=5" "requests>=2" "watchdog>=3"
          # Install remaining via pip
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller playwright

      - name: Inspect Cryptography Linkage (Intel)
        run: |
          source $CONDA/etc/profile.d/conda.sh
          conda activate autoyu
          CRYPTO_SO=$(python -c "import cryptography.hazmat.bindings._rust as m; print(m.__file__)")
          echo "cryptography binding: $CRYPTO_SO"
          otool -L "$CRYPTO_SO" || true

      - name: Create macOS Icon
        run: |
          source $CONDA/etc/profile.d/conda.sh
          conda activate autoyu
          python -c "from PIL import Image; img = Image.open('icon.ico'); img.save('icon.png')"
          mkdir -p icon.iconset
          sips -z 16 16     icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset
          cp icon.icns assets/icon.icns || cp icon.icns icon.icns

      - name: Install Playwright Browsers (Intel)
        run: |
          source $CONDA/etc/profile.d/conda.sh
          conda activate autoyu
          # Explicitly set PLAYWRIGHT_BROWSERS_PATH to ensure it goes to pw-browsers/
          export PLAYWRIGHT_BROWSERS_PATH="${{ github.workspace }}/pw-browsers"
          echo "PLAYWRIGHT_BROWSERS_PATH set to: $PLAYWRIGHT_BROWSERS_PATH"
          echo "=== Current directory contents ==="
          ls -la
          # Clean any existing pw-browsers
          rm -rf "$PLAYWRIGHT_BROWSERS_PATH"
          echo "=== Installing Playwright with verbose ==="
          python -m playwright install --with-deps chromium ffmpeg
          # Debug: Check full directory tree of pw-browsers/
          echo "=== Full tree of pw-browsers/ ==="
          find "$PLAYWRIGHT_BROWSERS_PATH" -print | sort
          echo "=== ls -la of pw-browsers/ ==="
          ls -la "$PLAYWRIGHT_BROWSERS_PATH"



      - name: Build Main Version (AutoYu Pro Intel)
        run: |
          source $CONDA/etc/profile.d/conda.sh
          conda activate autoyu
          # Explicitly set PLAYWRIGHT_BROWSERS_PATH
          export PLAYWRIGHT_BROWSERS_PATH="${{ github.workspace }}/pw-browsers"
          arch -x86_64 python -m PyInstaller --clean --noconfirm AutoYuPro.spec
          
          # Copy entire contents of pw-browsers to bundle
          if [ -d "pw-browsers" ]; then
            mkdir -p dist/AutoYuPro.app/Contents/Resources/browsers
            cp -R pw-browsers/* dist/AutoYuPro.app/Contents/Resources/browsers/
            
            find dist/AutoYuPro.app/Contents/Resources/browsers -name "translations" -type d -exec rm -rf {} +
            find dist/AutoYuPro.app/Contents/Resources/browsers -name "*.zip" -delete
            find dist/AutoYuPro.app/Contents/Resources/browsers -name "*.gz" -delete
            find dist/AutoYuPro.app/Contents/Resources/browsers -name "*.dSYM" -type d -exec rm -rf {} +
            find dist/AutoYuPro.app/Contents/Resources/browsers -name "obj" -type d -exec rm -rf {} +
            find dist/AutoYuPro.app/Contents/Resources/browsers -name "gen" -type d -exec rm -rf {} +
            
            # Clean extended attributes and fix permissions before codesign
            echo "Fixing permissions and extended attributes..."
            xattr -cr dist/AutoYuPro.app/Contents/Resources/browsers || true
            chmod -R 755 dist/AutoYuPro.app/Contents/Resources/browsers || true
            
            # Codesign Chromium bundles first if they exist
            echo "Codesigning internal browser components..."
            for chromium_app in dist/AutoYuPro.app/Contents/Resources/browsers/chromium-*/chrome-mac*/Chromium*.app; do
              if [ -d "$chromium_app" ]; then
                echo "Codesigning: $chromium_app"
                codesign --force --deep --sign - "$chromium_app" || true
              fi
            done
          fi
          # Ad-hoc codesign to avoid "App is damaged" error
          codesign --force --deep --sign - dist/AutoYuPro.app
          # Verify codesign
          codesign -vvv dist/AutoYuPro.app
          # Verify architecture
          echo "Checking app architecture:"
          file dist/AutoYuPro.app/Contents/MacOS/AutoYuPro

      - name: Verify bundled Chromium (Intel)
        run: |
          echo "=== Checking browsers folder contents ==="
          ls -la dist/AutoYuPro.app/Contents/Resources/browsers/
          echo ""
          echo "=== Checking registry.json ==="
          cat dist/AutoYuPro.app/Contents/Resources/browsers/registry.json || echo "WARNING: registry.json not found!"
          echo ""
          echo "=== Checking bundle size ==="
          du -sh dist/AutoYuPro.app

      - name: Smoke Test (macOS Pro Intel)
        run: |
          arch -x86_64 ./dist/AutoYuPro.app/Contents/MacOS/AutoYuPro --smoke-test

      - name: Prepare Artifacts (Intel)
        run: |
          mkdir -p release_pro
          cp PANDUAN_USER.txt release_pro/
          
          # Compress Pro Version
          if [ -d "dist/AutoYuPro.app" ]; then
            cp PANDUAN_USER.txt dist/AutoYuPro.app/Contents/Resources/
            cd dist && zip -r9y ../release_pro/AutoYuPro-Intel.zip AutoYuPro.app && cd ..
          fi

      - name: Upload Pro Artifact (Intel)
        uses: actions/upload-artifact@v4
        with:
          name: AutoYuPro-macOS-Intel
          path: release_pro/*

  # --- MAC APPLE SILICON BUILD (macos-14 native, fast) ---
  build-macos-apple-silicon:
    name: Build for Apple Silicon
    runs-on: macos-14
