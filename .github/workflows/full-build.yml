name: Multi-Platform Build (Win, Mac Intel, Mac Silicon)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # --- WINDOWS BUILD ---
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pyinstaller pillow
    
    - name: Install Playwright Browsers (Internal)
      run: |
        $env:PLAYWRIGHT_BROWSERS_PATH = "$PWD\pw-browsers"
        python -m playwright install chromium ffmpeg
    
    - name: Build with PyInstaller
      run: |
        # Build PRO
        pyinstaller --clean --noconfirm --distpath dist AutoYuPro.spec
    
    - name: Bundle Browser (Windows)
      run: |
        $APP_PATH = "dist\AutoYuPro"
        if (Test-Path "pw-browsers") {
            echo "📦 Bundling browsers for Windows..."
            New-Item -ItemType Directory -Force -Path "$APP_PATH\browsers"
            Copy-Item -Path "pw-browsers\*" -Destination "$APP_PATH\browsers" -Recurse
            
            echo "🧹 Cleaning archives..."
            Get-ChildItem -Path "$APP_PATH\browsers" -Filter "*.zip" -Recurse | Remove-Item
            Get-ChildItem -Path "$APP_PATH\browsers" -Filter "*.gz" -Recurse | Remove-Item
        }
    
    - name: Create Release Package
      run: |
        cd dist
        Copy-Item "..\PANDUAN_USER.txt" "AutoYuPro\"
        Compress-Archive -Path "AutoYuPro" -DestinationPath "..\AutoYuPro-Windows.zip"
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AutoYuPro-Windows
        path: AutoYuPro-Windows.zip

  # --- MAC INTEL BUILD ---
  build-mac-intel:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python (x64)
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'x64'
    
    - name: Install Dependencies (x64)
      run: |
        arch -x86_64 python -m venv venv
        source venv/bin/activate
        arch -x86_64 python -m pip install --upgrade pip
        arch -x86_64 python -m pip install -r requirements.txt pyinstaller pillow
    
    - name: Install Playwright Browsers (x64)
      run: |
        source venv/bin/activate
        export PLAYWRIGHT_BROWSERS_PATH=$PWD/pw-browsers
        arch -x86_64 python -m playwright install chromium ffmpeg
    
    - name: Build with PyInstaller (x64)
      run: |
        source venv/bin/activate
        python generate_icns.py || echo "ICNS generation failed"
        arch -x86_64 pyinstaller --clean --noconfirm --distpath dist AutoYuPro.spec
    
    - name: Bundle Browser (Mac Intel)
      run: |
        APP_PATH="dist/AutoYuPro.app"
        mkdir -p "$APP_PATH/Contents/Resources/browsers"
        cp -R pw-browsers/* "$APP_PATH/Contents/Resources/browsers/"
        find "$APP_PATH/Contents/Resources/browsers" -name "*.zip" -delete
        find "$APP_PATH/Contents/Resources/browsers" -name "*.gz" -delete
        codesign --force --deep --sign - "$APP_PATH"
    
    - name: Create Release Package
      run: |
        cd dist
        cp ../PANDUAN_USER.txt .
        zip -r9y ../AutoYuPro-macOS-Intel.zip AutoYuPro.app PANDUAN_USER.txt
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AutoYuPro-macOS-Intel
        path: AutoYuPro-macOS-Intel.zip

  # --- MAC SILICON BUILD ---
  build-mac-silicon:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python (arm64)
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Dependencies (arm64)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pyinstaller pillow
    
    - name: Install Playwright Browsers (arm64)
      run: |
        export PLAYWRIGHT_BROWSERS_PATH=$PWD/pw-browsers
        python -m playwright install chromium ffmpeg
    
    - name: Build with PyInstaller (arm64)
      run: |
        python generate_icns.py || echo "ICNS generation failed"
        pyinstaller --clean --noconfirm --distpath dist AutoYuPro.spec
    
    - name: Bundle Browser (Mac Silicon)
      run: |
        APP_PATH="dist/AutoYuPro.app"
        mkdir -p "$APP_PATH/Contents/Resources/browsers"
        cp -R pw-browsers/* "$APP_PATH/Contents/Resources/browsers/"
        find "$APP_PATH/Contents/Resources/browsers" -name "*.zip" -delete
        find "$APP_PATH/Contents/Resources/browsers" -name "*.gz" -delete
        codesign --force --deep --sign - "$APP_PATH"
    
    - name: Create Release Package
      run: |
        cd dist
        cp ../PANDUAN_USER.txt .
        zip -r9y ../AutoYuPro-macOS-AppleSilicon.zip AutoYuPro.app PANDUAN_USER.txt
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AutoYuPro-macOS-AppleSilicon
        path: AutoYuPro-macOS-AppleSilicon.zip
