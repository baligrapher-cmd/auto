name: Compile AutoYu for All Platforms

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force rebuild all artifacts"
        required: false
        default: "false"
        type: boolean

jobs:
  # --- WINDOWS BUILD ---
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller pillow playwright
    
    - name: Install Playwright Browsers (Internal)
      run: |
        $env:PLAYWRIGHT_BROWSERS_PATH = "$PWD\pw-browsers"
        python -m playwright install chromium chromium-headless-shell ffmpeg
    
    - name: Build Main Version (AutoYu Pro)
      run: |
        pyinstaller --clean --noconfirm AutoYuPro.spec
        # Manually copy browsers
        if (Test-Path "pw-browsers") {
          $APP_PATH = "dist\AutoYuPro"
          New-Item -ItemType Directory -Force -Path "$APP_PATH\browsers"
          Copy-Item -Path "pw-browsers\*" -Destination "$APP_PATH\browsers" -Recurse
        }
    
    - name: Smoke Test (Windows Pro)
      run: |
        cd dist\AutoYuPro
        .\AutoYuPro.exe --smoke-test
    
    - name: Prepare Artifacts
      run: |
        New-Item -ItemType Directory -Force -Path "release_pro" | Out-Null
        Copy-Item "PANDUAN_USER.txt" "release_pro\"
        
        # Compress Pro Version
        if (Test-Path "dist\AutoYuPro") {
          Copy-Item "PANDUAN_USER.txt" "dist\AutoYuPro\"
          Compress-Archive -Path "dist\AutoYuPro" -DestinationPath "release_pro\AutoYuPro-Windows.zip"
        }
    
    - name: Upload Pro Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AutoYuPro-Windows
        path: release_pro/*

  # --- MAC BUILDS ---
  build-macos:
    name: Build for ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      MACOSX_DEPLOYMENT_TARGET: '11.0'
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            python_version: '3.11'
            python_arch: x64
            label: Intel

          - os: macos-14
            python_version: '3.11'
            python_arch: arm64
            label: AppleSilicon

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}
          architecture: ${{ matrix.python_arch }}
          cache: 'pip'

      - name: Show Python Runtime
        run: |
          python -VV
          python -c "import platform, sys; print(platform.platform()); print(platform.machine()); print(sys.executable)"

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: cache-playwright
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ matrix.os }}-${{ matrix.python_arch }}-playwright-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ matrix.os }}-${{ matrix.python_arch }}-playwright-
            ${{ matrix.os }}-playwright-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          python -m pip install -r requirements.txt
          # Force the official wheel on macOS to avoid bundling a locally-built
          # cryptography extension against an incompatible OpenSSL runtime.
          python -m pip uninstall -y cryptography
          python -m pip install --only-binary cryptography --no-cache-dir cryptography
          python -m pip install pyinstaller

      - name: Inspect Cryptography Linkage
        run: |
          CRYPTO_SO=$(python -c "import cryptography.hazmat.bindings._rust as m; print(m.__file__)")
          echo "cryptography binding: $CRYPTO_SO"
          otool -L "$CRYPTO_SO" || true

      - name: Create macOS Icon
        run: |
          python -c "from PIL import Image; img = Image.open('icon.ico'); img.save('icon.png')"
          mkdir -p icon.iconset
          sips -z 16 16     icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset
          cp icon.icns assets/icon.icns || cp icon.icns icon.icns

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: |
          python -m playwright install chromium chromium-headless-shell ffmpeg

      - name: Build Main Version (AutoYu Pro)
        run: |
          python -m PyInstaller --clean --noconfirm AutoYuPro.spec
          # Copy only the browser runtimes we actually need, then remove bulky extras.
          if [ -d "pw-browsers" ]; then
            mkdir -p dist/AutoYuPro.app/Contents/Resources/browsers
            find pw-browsers -maxdepth 1 -type d \( -name "chromium-*" -o -name "chromium_headless_shell-*" -o -name "ffmpeg-*" \) -exec cp -R {} dist/AutoYuPro.app/Contents/Resources/browsers/ \;
            find dist/AutoYuPro.app/Contents/Resources/browsers -name "translations" -type d -exec rm -rf {} +
            find dist/AutoYuPro.app/Contents/Resources/browsers -name "*.zip" -delete
            find dist/AutoYuPro.app/Contents/Resources/browsers -name "*.gz" -delete
            find dist/AutoYuPro.app/Contents/Resources/browsers -name "*.dSYM" -type d -exec rm -rf {} +
            find dist/AutoYuPro.app/Contents/Resources/browsers -name "obj" -type d -exec rm -rf {} +
            find dist/AutoYuPro.app/Contents/Resources/browsers -name "gen" -type d -exec rm -rf {} +
          fi

      - name: Smoke Test (macOS Pro)
        run: |
          ./dist/AutoYuPro.app/Contents/MacOS/AutoYuPro --smoke-test

      - name: Prepare Artifacts
        run: |
          mkdir -p release_pro
          cp PANDUAN_USER.txt release_pro/
          
          # Compress Pro Version
          if [ -d "dist/AutoYuPro.app" ]; then
            cp PANDUAN_USER.txt dist/AutoYuPro.app/Contents/Resources/
            cd dist && zip -r9y ../release_pro/AutoYuPro-${{ matrix.label }}.zip AutoYuPro.app && cd ..
          fi

      - name: Upload Pro Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoYuPro-macOS-${{ matrix.label }}
          path: release_pro/*
