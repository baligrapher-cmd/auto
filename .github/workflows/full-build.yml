name: Multi-Platform Build (Win, Mac Intel, Mac Silicon)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # --- WINDOWS BUILD ---
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pyinstaller pillow
    
    - name: Install Playwright Browsers (Internal)
      run: |
        $env:PLAYWRIGHT_BROWSERS_PATH = "$PWD\pw-browsers"
        python -m playwright install chromium chromium-headless-shell ffmpeg
    
    - name: Build with PyInstaller
      run: |
        # Build PRO
        pyinstaller --clean --noconfirm --distpath dist AutoYuPro.spec
    
    - name: Bundle Browser (Windows)
      run: |
        $APP_PATH = "dist\AutoYuPro"
        if (Test-Path "pw-browsers") {
          echo "📦 Bundling browsers for Windows..."
          New-Item -ItemType Directory -Force -Path "$APP_PATH\browsers"
          Copy-Item -Path "pw-browsers\*" -Destination "$APP_PATH\browsers" -Recurse
          
          echo "🧹 Cleaning archives..."
          Get-ChildItem -Path "$APP_PATH\browsers" -Filter "*.zip" -Recurse | Remove-Item
          Get-ChildItem -Path "$APP_PATH\browsers" -Filter "*.gz" -Recurse | Remove-Item
        }
    
    - name: Smoke Test (Windows)
      run: |
        cd dist\AutoYuPro
        .\AutoYuPro.exe --smoke-test
    
    - name: Create Release Package
      run: |
        cd dist
        Copy-Item "..\PANDUAN_USER.txt" "AutoYuPro\"
        Compress-Archive -Path "AutoYuPro" -DestinationPath "..\AutoYuPro-Windows.zip"
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AutoYu-Windows-Build
        path: AutoYuPro-Windows.zip

  # --- MAC BUILDS ---
  build-macos:
    name: Build for ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Intel Mac Build
          - os: macos-13
            label: Intel

          # Apple Silicon Build
          - os: macos-14
            label: AppleSilicon

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Create macOS Icon
        run: |
          # Menggunakan python untuk membuat iconset sederhana dari icon.ico
          python -c "from PIL import Image; img = Image.open('icon.ico'); img.save('icon.png')"
          mkdir -p icon.iconset
          sips -z 16 16     icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset
          cp icon.icns assets/icon.icns 2>/dev/null || true

      - name: Install Playwright Browsers
        run: |
          PLAYWRIGHT_BROWSERS_PATH=./pw-browsers python -m playwright install chromium chromium-headless-shell ffmpeg

      - name: Build Main Version (AutoYu Pro)
        run: |
          pyinstaller --clean --noconfirm --distpath dist AutoYuPro.spec
          # Manually copy browsers to Resources to avoid PyInstaller SystemError on large binaries
          if [ -d "pw-browsers" ]; then
            mkdir -p dist/AutoYuPro.app/Contents/Resources/browsers
            cp -R pw-browsers/* dist/AutoYuPro.app/Contents/Resources/browsers/
            find dist/AutoYuPro.app/Contents/Resources/browsers -name "*.zip" -delete
            find dist/AutoYuPro.app/Contents/Resources/browsers -name "*.gz" -delete
          fi
          
      - name: Smoke Test (macOS)
        run: |
          ./dist/AutoYuPro.app/Contents/MacOS/AutoYuPro --smoke-test
          
      - name: Prepare Release Package
        run: |
          mkdir -p release
          cp PANDUAN_USER.txt release/
          
          if [ -d "dist/AutoYuPro.app" ]; then
            cp PANDUAN_USER.txt dist/AutoYuPro.app/Contents/Resources/
            cd dist && zip -r ../release/AutoYuPro-macOS-${{ matrix.label }}.zip AutoYuPro.app && cd ..
          fi

      - name: Upload Pro Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoYuPro-macOS-${{ matrix.label }}
          path: release/*
