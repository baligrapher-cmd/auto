name: Compile AutoYu for All Platforms

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # --- WINDOWS BUILD ---
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller pillow playwright
    
    - name: Install Playwright Browsers (Internal)
      run: |
        $env:PLAYWRIGHT_BROWSERS_PATH = "$PWD\pw-browsers"
        python -m playwright install chromium chromium-headless-shell ffmpeg
    
    - name: Build Main Version (AutoYu Pro)
      run: |
        pyinstaller --clean --noconfirm AutoYuPro.spec
        # Manually copy browsers
        if (Test-Path "pw-browsers") {
          $APP_PATH = "dist\AutoYuPro"
          New-Item -ItemType Directory -Force -Path "$APP_PATH\browsers"
          Copy-Item -Path "pw-browsers\*" -Destination "$APP_PATH\browsers" -Recurse
        }
    
    - name: Smoke Test (Windows Pro)
      run: |
        cd dist\AutoYuPro
        .\AutoYuPro.exe --smoke-test
    
    - name: Build Lite Version (AutoYu Lite)
      run: |
        pyinstaller --clean --noconfirm AutoYuLite.spec
        # Manually copy browsers
        if (Test-Path "pw-browsers") {
          $APP_PATH = "dist\AutoYuLite"
          New-Item -ItemType Directory -Force -Path "$APP_PATH\browsers"
          Copy-Item -Path "pw-browsers\*" -Destination "$APP_PATH\browsers" -Recurse
        }
    
    - name: Prepare Artifacts
      run: |
        mkdir -p release_pro
        mkdir -p release_lite
        Copy-Item "PANDUAN_USER.txt" "release_pro\"
        Copy-Item "PANDUAN_USER.txt" "release_lite\"
        
        # Compress Pro Version
        if (Test-Path "dist\AutoYuPro") {
          Copy-Item "PANDUAN_USER.txt" "dist\AutoYuPro\"
          Compress-Archive -Path "dist\AutoYuPro" -DestinationPath "release_pro\AutoYuPro-Windows.zip"
        }
        
        # Compress Lite Version
        if (Test-Path "dist\AutoYuLite") {
          Copy-Item "PANDUAN_USER.txt" "dist\AutoYuLite\"
          Compress-Archive -Path "dist\AutoYuLite" -DestinationPath "release_lite\AutoYuLite-Windows.zip"
        }
    
    - name: Upload Pro Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AutoYuPro-Windows
        path: release_pro/*
        
    - name: Upload Lite Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AutoYuLite-Windows
        path: release_lite/*

  # --- MAC BUILDS ---
  build-macos:
    name: Build for ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ARCH: ${{ matrix.arch_env }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Intel Mac Build (native x64 runner)
          - os: macos-15-intel
            arch_env: x86_64
            python_arch: x64
            label: Intel

          # Apple Silicon Build (native arm64 runner)
          - os: macos-15
            arch_env: arm64
            python_arch: arm64
            label: AppleSilicon

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.10'
          architecture: ${{ matrix.python_arch }}
          cache: 'pip'

      - name: Show Python Runtime
        run: |
          python -VV
          python -c "import platform, sys; print(platform.platform()); print(platform.machine()); print(sys.executable)"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller pillow playwright

      - name: Create macOS Icon
        run: |
          python -c "from PIL import Image; img = Image.open('icon.ico'); img.save('icon.png')"
          mkdir -p icon.iconset
          sips -z 16 16     icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset
          cp icon.icns assets/icon.icns || cp icon.icns icon.icns

      - name: Install Playwright Browsers
        run: |
          PLAYWRIGHT_BROWSERS_PATH=./pw-browsers python -m playwright install chromium

      - name: Build Main Version (AutoYu Pro)
        run: |
          python -m PyInstaller --clean --noconfirm AutoYuPro.spec
          # Manually copy browsers to Resources to avoid PyInstaller SystemError on large binaries
          if [ -d "pw-browsers" ]; then
            mkdir -p dist/AutoYuPro.app/Contents/Resources/browsers
            cp -R pw-browsers/* dist/AutoYuPro.app/Contents/Resources/browsers/
          fi

      - name: Smoke Test (macOS Pro)
        run: |
          ./dist/AutoYuPro.app/Contents/MacOS/AutoYuPro --smoke-test

      - name: Build Lite Version (AutoYu Lite)
        run: |
          python -m PyInstaller --clean --noconfirm AutoYuLite.spec
          # Manually copy browsers to Resources
          if [ -d "pw-browsers" ]; then
            mkdir -p dist/AutoYuLite.app/Contents/Resources/browsers
            cp -R pw-browsers/* dist/AutoYuLite.app/Contents/Resources/browsers/
          fi

      - name: Prepare Artifacts
        run: |
          mkdir -p release_pro
          mkdir -p release_lite
          cp PANDUAN_USER.txt release_pro/
          cp PANDUAN_USER.txt release_lite/
          
          # Compress Pro Version
          if [ -d "dist/AutoYuPro.app" ]; then
            cp PANDUAN_USER.txt dist/AutoYuPro.app/Contents/Resources/
            cd dist && zip -r ../release_pro/AutoYuPro-${{ matrix.label }}.zip AutoYuPro.app && cd ..
          fi
          
          # Compress Lite Version
          if [ -d "dist/AutoYuLite.app" ]; then
            cp PANDUAN_USER.txt dist/AutoYuLite.app/Contents/Resources/
            cd dist && zip -r ../release_lite/AutoYuLite-${{ matrix.label }}.zip AutoYuLite.app && cd ..
          fi

      - name: Upload Pro Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoYuPro-macOS-${{ matrix.label }}
          path: release_pro/*

      - name: Upload Lite Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoYuLite-macOS-${{ matrix.label }}
          path: release_lite/*
